<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Культура Паса</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Orbitron', monospace;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 15px;
            overflow-x: hidden;
            position: relative;
        }

        /* ФОНОВЫЕ ЭЛЕМЕНТЫ */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,119,198,0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120,219,255,0.2) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative; z-index: 1;
            max-width: 900px; margin: 0 auto;
        }

        /* ХЕДЕР */
        .header {
            text-align: center; margin-bottom: 30px; padding: 20px 0;
            background: rgba(10,10,20,0.8);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(0,255,136,0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }

        .logo {
            display: inline-block; margin-bottom: 15px;
        }
        .logo img {
            width: 100px; height: 100px; border-radius: 16px;
            border: 3px solid #00ff88; box-shadow: 
                0 0 30px rgba(0,255,136,0.6),
                inset 0 0 20px rgba(0,255,136,0.2);
            animation: logoGlow 3s ease-in-out infinite alternate;
        }

        @keyframes logoGlow {
            0% { box-shadow: 0 0 30px rgba(0,255,136,0.6), inset 0 0 20px rgba(0,255,136,0.2); }
            100% { box-shadow: 0 0 50px rgba(0,255,136,1), inset 0 0 30px rgba(0,255,136,0.4); }
        }

        .title {
            text-transform: uppercase; letter-spacing: 3px;
        }
        .title h1 {
            font-size: 28px; font-weight: 900; 
            background: linear-gradient(45deg, #00ff88 0%, #00ccff 50%, #ff00ff 100%);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0,255,136,0.8);
            margin-bottom: 5px;
        }
        .subtitle {
            font-size: 14px; color: #88ffaa; font-weight: 400;
            text-shadow: 0 0 10px rgba(136,255,170,0.5);
        }

        /* ПОЗИЦИИ - FM СТИЛЬ */
        .positions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 18px; margin-bottom: 20px;
        }

        .position-card {
            background: linear-gradient(145deg, rgba(30,30,50,0.9), rgba(15,15,30,0.9));
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0,255,136,0.4);
            border-radius: 16px;
            padding: 22px 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
            position: relative;
            overflow: hidden;
            text-align: center;
            min-height: 120px;
            display: flex; flex-direction: column; justify-content: center;
        }

        .position-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(0,255,136,0.1) 50%, transparent 70%);
            opacity: 0; transition: opacity 0.6s;
        }

        .position-card:hover::before {
            opacity: 1; animation: shine 1.5s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .position-card:hover {
            transform: translateY(-12px) scale(1.04);
            border-color: #00ff88;
            box-shadow: 
                0 20px 50px rgba(0,255,136,0.4),
                0 0 40px rgba(0,255,136,0.3);
        }

        .position-icon {
            font-size: 36px; margin-bottom: 12px; display: block;
            text-shadow: 0 0 15px rgba(0,255,136,0.8);
        }

        .position-name {
            font-size: 14px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; color: #ffffff;
            text-shadow: 0 0 8px rgba(255,255,255,0.6);
        }

        /* НАВИГАЦИЯ */
        .nav-top {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(15,15,30,0.95); backdrop-filter: blur(20px);
            border-radius: 25px; padding: 8px 20px;
            border: 1px solid rgba(0,255,136,0.5);
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            z-index: 1000;
        }

        .back-btn {
            background: linear-gradient(145deg, rgba(0,255,136,0.2), rgba(0,200,100,0.2));
            border: 2px solid #00ff88; border-radius: 50%;
            width: 48px; height: 48px; color: #00ff88;
            font-size: 18px; font-weight: 700; cursor: pointer;
            backdrop-filter: blur(15px); transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: linear-gradient(145deg, rgba(0,255,136,0.4), rgba(0,200,100,0.4));
            transform: scale(1.15); box-shadow: 0 0 25px rgba(0,255,136,0.7);
        }

        .hidden { display: none !important; }

        /* ФАЗЫ */
        .phases-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px; max-width: 500px; margin: 0 auto;
        }

        .phase-card {
            background: linear-gradient(145deg, rgba(50,50,80,0.9), rgba(30,30,60,0.9));
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0,255,136,0.3);
            border-radius: 16px;
            padding: 28px 20px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .phase-attack {
            border-color: #ff5555; background: linear-gradient(145deg, rgba(80,20,20,0.9), rgba(60,15,15,0.9));
        }
        .phase-defense {
            border-color: #5555ff; background: linear-gradient(145deg, rgba(20,20,80,0.9), rgba(15,15,60,0.9));
        }

        .phase-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 50px rgba(0,255,136,0.3);
        }

        .phase-icon { font-size: 44px; margin-bottom: 12px; display: block; }
        .phase-name { 
            font-size: 18px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* АДАПТИВ */
        @media (max-width: 600px) {
            .title h1 { font-size: 24px; }
            .positions-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .phases-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="nav-top hidden" id="nav-top">
        <button class="back-btn" onclick="goBack()">←</button>
    </div>

    <div class="container">
        <!-- ХЕДЕР -->
        <div class="header">
            <div class="logo">
                <img src="./logokp.jpeg" alt="Культура Паса" 
                     onerror="this.src='https://via.placeholder.com/100/00ff88/1a1a2e?text=⚽'">
            </div>
            <div class="title">
                <h1>Культура Паса</h1>
                <p class="subtitle">TACTICAL ACADEMY</p>
            </div>
        </div>

        <!-- ПОЗИЦИИ -->
        <div class="positions-grid" id="positions-screen">
            <div class="position-card" onclick="selectPosition('🛡️ Центральный защитник')">
                <div class="position-icon">🛡️</div>
                <div class="position-name">Центральный<br>защитник</div>
            </div>
            <div class="position-card" onclick="selectPosition('⬇️ Крайний защитник')">
                <div class="position-icon">⬇️</div>
                <div class="position-name">Крайний<br>защитник</div>
            </div>
            <div class="position-card" onclick="selectPosition('⚙️ Опорный полузащитник')">
                <div class="position-icon">⚙️</div>
                <div class="position-name">Опорный<br>полузащитник</div>
            </div>
            <div class="position-card" onclick="selectPosition('🎯 Атакующий полузащитник')">
                <div class="position-icon">🎯</div>
                <div class="position-name">Атакующий<br>полузащитник</div>
            </div>
            <div class="position-card" onclick="selectPosition('➡️ Инсайд')">
                <div class="position-icon">➡️</div>
                <div class="position-name">Инсайд</div>
            </div>
            <div class="position-card" onclick="selectPosition('👑 Центральный нападающий')">
                <div class="position-icon">👑</div>
                <div class="position-name">Центральный<br>нападающий</div>
            </div>
            <div class="position-card" onclick="selectPosition('🎪 Крайний нападающий')">
                <div class="position-icon">🎪</div>
                <div class="position-name">Крайний<br>нападающий</div>
            </div>
        </div>

        <!-- ФАЗЫ -->
        <div class="phases-grid hidden" id="phases-screen"></div>
    </div>

    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        Telegram.WebApp.MainButton.setParams({ is_visible: false });

        let selectedPosition = '', selectedPhase = '';

        function selectPosition(position) {
            selectedPosition = position;
            Telegram.WebApp.MainButton.setText('Выбрать фазу').show();
            Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            
            document.getElementById('positions-screen').classList.add('hidden');
            document.getElementById('nav-top').classList.remove('hidden');
            
            document.getElementById('phases-screen').classList.remove('hidden');
            document.getElementById('phases-screen').innerHTML = `
                <div class="position-card" style="grid-column: 1/-1; text-align: center; padding: 30px 20px; border-color: #00ff88;">
                    <div class="position-icon" style="font-size: 48px;">${position.split(' ')[0]}</div>
                    <div class="position-name" style="font-size: 20px; margin-top: 10px;">${selectedPosition}</div>
                    <p style="margin-top: 15px; color: #88ffaa; font-size: 14px;">Выбери фазу игры</p>
                </div>
                <div class="phase-card phase-attack" onclick="selectPhase('⚔️ Атака')">
                    <div class="phase-icon">⚔️</div>
                    <div class="phase-name">АТАКА</div>
                </div>
                <div class="phase-card phase-defense" onclick="selectPhase('🛡️ Оборона')">
                    <div class="phase-icon">🛡️</div>
                    <div class="phase-name">ОБОРОНА</div>
                </div>
            `;
        }

        function selectPhase(phase) {
            selectedPhase = phase;
            Telegram.WebApp.MainButton.setText(`▶️ ${selectedPosition} — ${phase}`);
            Telegram.WebApp.HapticFeedback.notificationOccurred('success');
        }

        Telegram.WebApp.MainButton.onClick(() => {
            if (selectedPosition && selectedPhase) {
                Telegram.WebApp.sendData(JSON.stringify({ position: selectedPosition, phase: selectedPhase }));
                Telegram.WebApp.close();
            }
        });

        function goBack() {
            document.getElementById('positions-screen').classList.remove('hidden');
            document.getElementById('phases-screen').classList.add('hidden');
            document.getElementById('nav-top').classList.add('hidden');
            Telegram.WebApp.MainButton.setParams({ is_visible: false });
        }
    </script>
</body>
</html>
