<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Культура Паса</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000000;
            color: white;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        .logo { text-align: center; margin-bottom: 20px; }
        .logo img {
            width: 120px; height: 120px; border-radius: 20px;
            border: 4px solid #00ff88; box-shadow: 0 0 30px rgba(0,255,136,0.5);
            animation: pulse 2s infinite; object-fit: cover;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 30px rgba(0,255,136,0.5); }
            50% { box-shadow: 0 0 50px rgba(0,255,136,0.8); }
        }
        .title h1 {
            font-size: 36px; font-weight: 800; color: white;
            text-shadow: 0 0 20px rgba(255,255,255,0.5); margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .subtitle { font-size: 18px; color: #cccccc; font-weight: 300; }
        .positions, .phases {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px; max-width: 800px; margin: 0 auto 40px;
        }
        .position-btn, .phase-btn {
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            border: 2px solid #333; border-radius: 20px;
            padding: 25px 15px; font-size: 18px; font-weight: 600;
            color: white; cursor: pointer; transition: all 0.4s ease;
            text-align: center; position: relative; overflow: hidden;
            line-height: 1.3;
        }
        .position-btn:hover, .phase-btn:hover {
            border-color: #00ff88; box-shadow: 0 15px 40px rgba(0,255,136,0.3);
            transform: translateY(-8px) scale(1.05);
        }
        .position-icon, .phase-icon { 
            display: block; font-size: 32px; margin-bottom: 8px; 
        }
        .back-btn {
            position: fixed; top: 20px; left: 20px;
            background: rgba(0,0,0,0.7); border: 2px solid #00ff88;
            border-radius: 50%; width: 55px; height: 55px;
            color: #00ff88; font-size: 20px; font-weight: bold;
            cursor: pointer; z-index: 1000;
        }
        .back-btn:hover { background: rgba(0,255,136,0.2); transform: scale(1.1); }
        .hidden { display: none !important; }
        @media (max-width: 600px) {
            .title h1 { font-size: 28px; }
            .positions, .phases { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .position-btn, .phase-btn { font-size: 16px; padding: 20px 10px; }
        }
    </style>
</head>
<body>
    <button class="back-btn hidden" onclick="goBack()">←</button>
    
    <!-- ЛОГО -->
    <div class="logo">
        <img src="./logokp.jpeg" alt="Культура Паса" 
             onerror="this.src='https://via.placeholder.com/120/00ff88/000000?text=⚽'">
        <div class="title">
            <h1>КУЛЬТУРА ПАСА</h1>
            <p class="subtitle">Выбери свою позицию на поле</p>
        </div>
    </div>

    <!-- ТВОИ ПОЗИЦИИ -->
    <div class="positions" id="positions-screen">
        <button class="position-btn" onclick="selectPosition('🛡️ Центральный защитник')">
            <span class="position-icon">🛡️</span>
            <span>Центральный<br>защитник</span>
        </button>
        <button class="position-btn" onclick="selectPosition('⬇️ Крайний защитник')">
            <span class="position-icon">⬇️</span>
            <span>Крайний<br>защитник</span>
        </button>
        <button class="position-btn" onclick="selectPosition('⚙️ Опорный полузащитник')">
            <span class="position-icon">⚙️</span>
            <span>Опорный<br>полузащитник</span>
        </button>
        <button class="position-btn" onclick="selectPosition('🎯 Атакующий полузащитник')">
            <span class="position-icon">🎯</span>
            <span>Атакующий<br>полузащитник</span>
        </button>
        <button class="position-btn" onclick="selectPosition('➡️ Инсайд')">
            <span class="position-icon">➡️</span>
            <span>Инсайд</span>
        </button>
        <button class="position-btn" onclick="selectPosition('👑 Центральный нападающий')">
            <span class="position-icon">👑</span>
            <span>Центральный<br>нападающий</span>
        </button>
        <button class="position-btn" onclick="selectPosition('🎪 Крайний нападающий')">
            <span class="position-icon">🎪</span>
            <span>Крайний<br>нападающий</span>
        </button>
    </div>

    <!-- ФАЗЫ -->
    <div id="phases-screen" class="phases hidden"></div>

    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        
        let selectedPosition = '';
        let selectedPhase = '';

        Telegram.WebApp.MainButton.setParams({ is_visible: false });

        function selectPosition(position) {
            selectedPosition = position;
            Telegram.WebApp.MainButton.setText('Выбрать фазу').show();
            Telegram.WebApp.HapticFeedback.impactOccurred('light');
            
            document.getElementById('positions-screen').classList.add('hidden');
            document.querySelector('.back-btn').classList.remove('hidden');
            
            document.getElementById('phases-screen').classList.remove('hidden');
            document.getElementById('phases-screen').innerHTML = `
                <div style="text-align: center; margin-bottom: 30px;">
                    <h2 style="font-size: 24px; color: #00ff88; margin-bottom: 10px;">${selectedPosition}</h2>
                    <p style="color: #cccccc;">Выбери фазу игры</p>
                </div>
                <button class="phase-btn" onclick="selectPhase('⚔️ Атака')" 
                       style="background: linear-gradient(145deg, #ff4444, #cc0000); border-color: #ff6666;">
                    <span class="phase-icon">⚔️</span>
                    <span>АТАКА</span>
                </button>
                <button class="phase-btn" onclick="selectPhase('🛡️ Оборона')" 
                       style="background: linear-gradient(145deg, #4477ff, #0055cc); border-color: #6699ff;">
                    <span class="phase-icon">🛡️</span>
                    <span>ОБОРОНА</span>
                </button>
            `;
            document.getElementById('phases-screen').scrollIntoView({ behavior: 'smooth' });
        }

        function selectPhase(phase) {
            selectedPhase = phase;
            Telegram.WebApp.MainButton.setText(`📹 ${selectedPosition} — ${phase}`);
            Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        }

        Telegram.WebApp.MainButton.onClick(() => {
            if (selectedPosition && selectedPhase) {
                const data = { position: selectedPosition, phase: selectedPhase };
                Telegram.WebApp.sendData(JSON.stringify(data));
                Telegram.WebApp.close();
            }
        });

        function goBack() {
            document.getElementById('positions-screen').classList.remove('hidden');
            document.getElementById('phases-screen').classList.add('hidden');
            document.querySelector('.back-btn').classList.add('hidden');
            Telegram.WebApp.MainButton.setParams({ is_visible: false });
        }
    </script>
</body>
</html>
