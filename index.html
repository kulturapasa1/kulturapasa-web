<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Культура Паса</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0f0f0f 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: ''; position: fixed; inset: 0;
            background: 
                radial-gradient(circle at 20% 20%, rgba(255,215,0,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0,255,136,0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(138,43,226,0.04) 0%, transparent 70%);
            pointer-events: none; z-index: -1;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

        .header {
            text-align: center; padding: 60px 0 40px;
            background: rgba(10,10,15,0.6); backdrop-filter: blur(40px);
            border-radius: 0 0 40px 40px; border: 1px solid rgba(255,215,0,0.2);
            box-shadow: 0 20px 80px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
            margin-bottom: 50px; position: relative; overflow: hidden;
        }

        .header::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255,215,0,0.04) 50%, transparent 70%),
                        linear-gradient(-45deg, transparent 30%, rgba(0,255,136,0.04) 50%, transparent 70%);
            animation: shimmer 4s linear infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .logo-premium {
            width: 140px; height: 140px; margin: 0 auto 25px;
            border-radius: 32px; border: 4px solid transparent;
            background: linear-gradient(45deg, #ffd700, #00ff88, #9370db) border-box;
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask-composite: exclude; -webkit-mask-composite: xor;
            box-shadow: 0 0 60px rgba(255,215,0,0.6), 0 0 120px rgba(0,255,136,0.4), inset 0 0 40px rgba(255,255,255,0.1);
            animation: logoFloat 6s ease-in-out infinite; object-fit: cover;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        .title-premium {
            font-size: 48px; font-weight: 900; 
            background: linear-gradient(135deg, #ffd700 0%, #ffffff 50%, #00ff88 100%);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px; line-height: 1.1;
            text-shadow: 0 0 60px rgba(255,215,0,0.6);
            margin-bottom: 12px;
        }

        .subtitle-premium {
            font-size: 20px; font-weight: 400; color: #b0b0b0;
            letter-spacing: 2px; text-transform: uppercase;
            position: relative;
        }

        .subtitle-premium::after {
            content: ''; position: absolute; bottom: -8px; left: 50%;
            transform: translateX(-50%); width: 60px; height: 2px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
            border-radius: 2px;
        }

        .positions-premium {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px; padding: 0 20px;
        }

        .position-premium {
            background: rgba(20,20,30,0.8); backdrop-filter: blur(30px);
            border: 1px solid rgba(255,215,0,0.3); border-radius: 24px;
            padding: 40px 30px; cursor: pointer; transition: all 0.5s cubic-bezier(0.23,1,0.32,1.4);
            position: relative; overflow: hidden; text-align: center;
            height: 220px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        .position-premium::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(45deg, rgba(255,215,0,0.1) 0%, rgba(0,255,136,0.08) 50%, rgba(147,112,219,0.06) 100%);
            opacity: 0; transition: opacity 0.5s ease; z-index: 0;
        }

        .position-premium:hover::before { opacity: 1; }
        .position-premium:hover {
            transform: translateY(-20px) scale(1.03); border-color: #ffd700;
            box-shadow: 0 40px 100px rgba(255,215,0,0.4), 0 0 80px rgba(0,255,136,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
        }

        .position-icon-premium {
            font-size: 64px; margin-bottom: 20px;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.8));
            background: linear-gradient(135deg, #ffd700, #00ff88);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; position: relative; z-index: 2;
        }

        .position-name-premium {
            font-size: 18px; font-weight: 700; color: #ffffff;
            letter-spacing: 1px; line-height: 1.4;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            position: relative; z-index: 2; max-height: 4.2em; overflow: hidden;
        }

        .back-btn-premium {
            position: fixed; top: 30px; left: 30px; z-index: 1000;
            width: 60px; height: 60px; border-radius: 20px;
            background: rgba(255,215,0,0.2); backdrop-filter: blur(20px);
            border: 2px solid #ffd700; color: #ffd700;
            font-size: 24px; font-weight: 700; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23,1,0.32,1);
            display: flex; align-items: center; justify-content: center;
        }

        .back-btn-premium:hover {
            background: rgba(255,215,0,0.4);
            transform: scale(1.15) rotate(180deg);
            box-shadow: 0 20px 60px rgba(255,215,0,0.5);
        }

        .phases-premium {
            position: fixed; right: 30px; top: 50%; transform: translateY(-50%);
            width: 320px; background: rgba(15,15,25,0.95);
            backdrop-filter: blur(40px); border-radius: 32px;
            border: 1px solid rgba(255,215,0,0.4);
            padding: 40px; box-shadow: 
                0 40px 120px rgba(0,0,0,0.9),
                inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .phase-title {
            font-size: 28px; font-weight: 800; color: #ffd700;
            text-align: center; margin-bottom: 30px;
            text-shadow: 0 2px 12px rgba(255,215,0,0.6);
        }

        .phase-grid { display: flex; flex-direction: column; gap: 20px; }

        .phase-premium {
            background: rgba(30,30,45,0.8); border-radius: 20px;
            padding: 30px; cursor: pointer; transition: all 0.4s ease;
            border: 2px solid transparent; position: relative; overflow: hidden;
            display: flex; align-items: center; gap: 25px;
        }

        .phase-attack { border-image: linear-gradient(45deg, #ff6b6b, #ff8e8e) 1; }
        .phase-defense { border-image: linear-gradient(45deg, #4facfe, #7db9ff) 1; }

        .phase-premium:hover {
            border-color: #ffd700; transform: translateX(12px) scale(1.02);
            box-shadow: 0 20px 60px rgba(255,215,0,0.4);
        }

        .phase-icon-premium { font-size: 48px; }
        .phase-text h3 { font-size: 22px; font-weight: 700; color: #ffffff; margin-bottom: 6px; }
        .phase-text p { font-size: 14px; color: #b0b0b0; font-weight: 400; }

        @media (max-width: 768px) {
            .title-premium { font-size: 36px; }
            .positions-premium { grid-template-columns: repeat(2, 1fr); gap: 20px; }
            .phases-premium { 
                position: fixed; left: 0; right: 0; bottom: 0;
                border-radius: 32px 32px 0 0; width: 100%; max-height: 60vh;
                overflow-y: auto;
            }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <button class="back-btn-premium hidden" onclick="goBack()">←</button>

    <div class="container" id="main-screen">
        <div class="header">
            <img src="./logokp.jpeg" class="logo-premium" 
                 onerror="this.src='https://via.placeholder.com/140/ffd700/1a1a1a?text=⚽'">
            <div class="title-premium">КУЛЬТУРА ПАСА</div>
            <div class="subtitle-premium">ТАКТИЧЕСКАЯ АКАДЕМИЯ</div>
        </div>

        <div class="positions-premium" id="positions-screen">
            <div class="position-premium" onclick="selectPosition('🛡️ Центральный защитник')">
                <div class="position-icon-premium">🛡️</div>
                <div class="position-name-premium">Центральный защитник</div>
            </div>
            <div class="position-premium" onclick="selectPosition('⬇️ Крайний защитник')">
                <div class="position-icon-premium">⬇️</div>
                <div class="position-name-premium">Крайний защитник</div>
            </div>
            <div class="position-premium" onclick="selectPosition('⚙️ Опорный полузащитник')">
                <div class="position-icon-premium">⚙️</div>
                <div class="position-name-premium">Опорный полузащитник</div>
            </div>
            <div class="position-premium" onclick="selectPosition('🎯 Атакующий полузащитник')">
                <div class="position-icon-premium">🎯</div>
                <div class="position-name-premium">Атакующий полузащитник</div>
            </div>
            <div class="position-premium" onclick="selectPosition('➡️ Инсайд')">
                <div class="position-icon-premium">➡️</div>
                <div class="position-name-premium">Инсайд</div>
            </div>
            <div class="position-premium" onclick="selectPosition('👑 Центральный нападающий')">
                <div class="position-icon-premium">👑</div>
                <div class="position-name-premium">Центральный нападающий</div>
            </div>
            <div class="position-premium" onclick="selectPosition('🎪 Крайний нападающий')">
                <div class="position-icon-premium">🎪</div>
                <div class="position-name-premium">Крайний нападающий</div>
            </div>
        </div>
    </div>

    <div class="phases-premium hidden" id="phases-screen">
        <div class="phase-title" id="phase-title"></div>
        <div class="phase-grid">
            <div class="phase-premium phase-attack" onclick="selectPhase('⚔️ Атака')">
                <div class="phase-icon-premium">⚔️</div>
                <div class="phase-text">
                    <h3>ПРЕМИУМ АТАКА</h3>
                    <p>Тактические решения</p>
                </div>
            </div>
            <div class="phase-premium phase-defense" onclick="selectPhase('🛡️ Оборона')">
                <div class="phase-icon-premium">🛡️</div>
                <div class="phase-text">
                    <h3>ПРЕМИУМ ОБОРОНА</h3>
                    <p>Позиционная игра</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        Telegram.WebApp.ready(); Telegram.WebApp.expand();
        Telegram.WebApp.MainButton.setParams({ is_visible: false });
        
        let selectedPosition = '', selectedPhase = '';

        function selectPosition(position) {
            selectedPosition = position;
            Telegram.WebApp.MainButton.setText('Выбрать фазу').show().setParams({
                color: '#ffd700', text_color: '#000000'
            });
            
            document.getElementById('main-screen').style.opacity = '0.3';
            document.querySelector('.back-btn-premium').classList.remove('hidden');
            document.getElementById('phases-screen').classList.remove('hidden');
            
            document.getElementById('phase-title').textContent = position;
            
            Telegram.WebApp.HapticFeedback.impactOccurred('heavy');
        }

        function selectPhase(phase) {
            selectedPhase = phase;
            Telegram.WebApp.MainButton.setText(`${selectedPosition} — ${phase}`);
            Telegram.WebApp.HapticFeedback.notificationOccurred('success');
        }

        Telegram.WebApp.MainButton.onClick(() => {
            if (selectedPosition && selectedPhase) {
                Telegram.WebApp.sendData(JSON.stringify({
                    position: selectedPosition, phase: selectedPhase
                }));
                Telegram.WebApp.close();
            }
        });

        function goBack() {
            document.getElementById('main-screen').style.opacity = '1';
            document.querySelector('.back-btn-premium').classList.add('hidden');
            document.getElementById('phases-screen').classList.add('hidden');
            Telegram.WebApp.MainButton.setParams({ is_visible: false });
        }
    </script>
</body>
</html>
