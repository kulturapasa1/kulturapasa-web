<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Культура Паса</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Condensed:wght@300;400;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Roboto Condensed', sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #21262d 100%);
            color: #e6edf3;
            min-height: 100vh;
            padding: 0;
            overflow-x: hidden;
        }

        /* FM25 БОКОВЫЕ ПАНЕЛИ */
        .sidebar-left {
            position: fixed; left: 0; top: 0; bottom: 0; width: 70px;
            background: linear-gradient(180deg, #0d1117 0%, #161b22 100%);
            border-right: 1px solid #30363d;
            z-index: 100;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 0;
            gap: 20px;
        }

        .sidebar-right {
            position: fixed; right: 0; top: 0; bottom: 0; width: 280px;
            background: linear-gradient(180deg, #161b22 0%, #21262d 100%);
            border-left: 1px solid #30363d;
            z-index: 100;
            padding: 20px;
            overflow-y: auto;
        }

        .main-content {
            margin-left: 70px; margin-right: 280px; padding: 20px;
            min-height: 100vh;
        }

        /* КНОПКИ БОКОВЫХ ПАНЕЛЕЙ */
        .nav-btn {
            width: 50px; height: 50px; border-radius: 8px;
            background: rgba(40,46,56,0.8); border: 1px solid #30363d;
            color: #8b949e; font-size: 20px; cursor: pointer;
            transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;
        }
        .nav-btn:hover { background: rgba(0,255,136,0.2); border-color: #00ff88; color: #00ff88; }

        /* ХЕДЕР FM25 */
        .header {
            background: linear-gradient(90deg, #161b22 0%, #21262d 100%);
            border-bottom: 1px solid #30363d; padding: 15px 25px;
            display: flex; align-items: center; gap: 20px;
            border-radius: 8px; margin-bottom: 20px;
        }

        .logo-small {
            width: 45px; height: 45px; border-radius: 8px; border: 2px solid #00ff88;
            object-fit: cover;
        }

        .header-title {
            font-size: 22px; font-weight: 700; color: #f0f6fc;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        .header-subtitle {
            font-size: 12px; color: #8b949e; font-weight: 400;
        }

        /* ОСНОВНОЙ ГРИД ПОЗИЦИЙ */
        .positions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px; padding: 20px; max-width: 100%;
        }

        .position-card {
            background: linear-gradient(145deg, #21262d 0%, #161b22 100%);
            border: 1px solid #30363d; border-radius: 12px;
            padding: 24px 20px; cursor: pointer; transition: all 0.3s ease;
            position: relative; overflow: hidden; height: 140px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; text-align: center;
        }

        .position-card::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%; background: radial-gradient(circle, rgba(0,255,136,0.1) 0%, transparent 70%);
            opacity: 0; transition: opacity 0.4s ease;
        }

        .position-card:hover::before { opacity: 1; }
        .position-card:hover {
            border-color: #00ff88; transform: translateY(-6px);
            box-shadow: 0 16px 40px rgba(0,255,136,0.3);
            background: linear-gradient(145deg, #252c36 0%, #1a1f2a 100%);
        }

        .position-icon {
            font-size: 44px; margin-bottom: 12px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
        }

        .position-name {
            font-size: 14px; font-weight: 700; color: #f0f6fc;
            line-height: 1.3; text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            max-height: 3.6em; overflow: hidden;
        }

        /* ПРАВАЯ ПАНЕЛЬ — ФАЗЫ */
        .phase-header {
            font-size: 18px; font-weight: 700; color: #f0f6fc;
            margin-bottom: 20px; padding-bottom: 12px;
            border-bottom: 1px solid #30363d; text-align: center;
        }

        .phases-grid {
            display: flex; flex-direction: column; gap: 12px;
        }

        .phase-card {
            background: linear-gradient(145deg, #1f2937 0%, #111827 100%);
            border: 1px solid #4b5563; border-radius: 10px;
            padding: 20px; cursor: pointer; transition: all 0.3s ease;
            display: flex; align-items: center; gap: 16px;
            position: relative; overflow: hidden;
        }

        .phase-attack { border-color: #ef4444; }
        .phase-defense { border-color: #3b82f6; }

        .phase-card:hover {
            border-color: #00ff88; transform: translateX(4px);
            box-shadow: 0 8px 24px rgba(0,255,136,0.2);
        }

        .phase-icon { font-size: 28px; }
        .phase-info h3 { font-size: 16px; font-weight: 700; color: #f0f6fc; }
        .phase-info p { font-size: 12px; color: #9ca3af; margin-top: 2px; }

        /* АДАПТИВ */
        @media (max-width: 768px) {
            .sidebar-left { transform: translateX(-100%); transition: transform 0.3s; }
            .sidebar-right { transform: translateX(100%); transition: transform 0.3s; }
            .main-content { margin-left: 0; margin-right: 0; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- ЛЕВАЯ ПАНЕЛЬ -->
    <div class="sidebar-left" id="sidebar-left">
        <div class="nav-btn">🏆</div>
        <div class="nav-btn">📊</div>
        <div class="nav-btn">⚙️</div>
    </div>

    <div class="main-content">
        <!-- ХЕДЕР -->
        <div class="header">
            <img src="./logokp.jpeg" alt="Культура Паса" class="logo-small"
                 onerror="this.src='https://via.placeholder.com/45/00ff88/21262d?text=⚽'">
            <div>
                <div class="header-title">КУЛЬТУРА ПАСА</div>
                <div class="header-subtitle">TACTICAL ACADEMY</div>
            </div>
        </div>

        <!-- ПОЗИЦИИ -->
        <div class="positions-grid" id="positions-screen">
            <div class="position-card" onclick="selectPosition('🛡️ Центральный защитник')">
                <div class="position-icon">🛡️</div>
                <div class="position-name">Центральный защитник</div>
            </div>
            <div class="position-card" onclick="selectPosition('⬇️ Крайний защитник')">
                <div class="position-icon">⬇️</div>
                <div class="position-name">Крайний защитник</div>
            </div>
            <div class="position-card" onclick="selectPosition('⚙️ Опорный полузащитник')">
                <div class="position-icon">⚙️</div>
                <div class="position-name">Опорный полузащитник</div>
            </div>
            <div class="position-card" onclick="selectPosition('🎯 Атакующий полузащитник')">
                <div class="position-icon">🎯</div>
                <div class="position-name">Атакующий полузащитник</div>
            </div>
            <div class="position-card" onclick="selectPosition('➡️ Инсайд')">
                <div class="position-icon">➡️</div>
                <div class="position-name">Инсайд</div>
            </div>
            <div class="position-card" onclick="selectPosition('👑 Центральный нападающий')">
                <div class="position-icon">👑</div>
                <div class="position-name">Центральный нападающий</div>
            </div>
            <div class="position-card" onclick="selectPosition('🎪 Крайний нападающий')">
                <div class="position-icon">🎪</div>
                <div class="position-name">Крайний нападающий</div>
            </div>
        </div>
    </div>

    <!-- ПРАВАЯ ПАНЕЛЬ -->
    <div class="sidebar-right hidden" id="sidebar-right">
        <div class="phase-header" id="phase-header"></div>
        <div class="phases-grid" id="phases-grid"></div>
    </div>

    <script>
        Telegram.WebApp.ready(); Telegram.WebApp.expand();
        Telegram.WebApp.MainButton.setParams({ is_visible: false });
        
        let selectedPosition = '', selectedPhase = '';

        function selectPosition(position) {
            selectedPosition = position;
            Telegram.WebApp.MainButton.setText('Выбрать фазу').show();
            
            document.getElementById('positions-screen').classList.add('hidden');
            document.getElementById('sidebar-right').classList.remove('hidden');
            
            document.getElementById('phase-header').textContent = position;
            document.getElementById('phases-grid').innerHTML = `
                <div class="phase-card phase-attack" onclick="selectPhase('⚔️ Атака')">
                    <div class="phase-icon">⚔️</div>
                    <div class="phase-info">
                        <h3>АТАКА</h3>
                        <p>Тактика владения</p>
                    </div>
                </div>
                <div class="phase-card phase-defense" onclick="selectPhase('🛡️ Оборона')">
                    <div class="phase-icon">🛡️</div>
                    <div class="phase-info">
                        <h3>ОБОРОНА</h3>
                        <p>Компактность</p>
                    </div>
                </div>
            `;
            
            Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        }

        function selectPhase(phase) {
            selectedPhase = phase;
            Telegram.WebApp.MainButton.setText(`${selectedPosition} — ${phase}`);
            Telegram.WebApp.HapticFeedback.notificationOccurred('success');
        }

        Telegram.WebApp.MainButton.onClick(() => {
            if (selectedPosition && selectedPhase) {
                Telegram.WebApp.sendData(JSON.stringify({
                    position: selectedPosition, 
                    phase: selectedPhase
                }));
                Telegram.WebApp.close();
            }
        });
    </script>
</body>
</html>
