<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Культура Паса</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0f0f0f 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Твой логотип через GitHub RAW */
        .logo-premium {
            width: 140px; height: 140px; margin: 0 auto 25px;
            border-radius: 32px; border: 4px solid transparent;
            background: 
                linear-gradient(45deg, #ffd700, #00ff88, #9370db) border-box,
                url('https://raw.githubusercontent.com/kulturapasa1/kulturapasa-web/main/logokp.jpeg');
            background-size: cover; background-position: center;
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask-composite: exclude; -webkit-mask-composite: xor;
            box-shadow: 0 0 60px rgba(255,215,0,0.6), 0 0 120px rgba(0,255,136,0.4);
            animation: logoFloat 6s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        .header {
            text-align: center; padding: 60px 0 40px;
            background: rgba(10,10,15,0.6); backdrop-filter: blur(40px);
            border-radius: 0 0 40px 40px; border: 1px solid rgba(255,215,0,0.2);
            box-shadow: 0 20px 80px rgba(0,0,0,0.8);
            margin-bottom: 50px;
        }

        .title-premium {
            font-size: 48px; font-weight: 900; 
            background: linear-gradient(135deg, #ffd700 0%, #ffffff 50%, #00ff88 100%);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .subtitle-premium {
            font-size: 20px; font-weight: 400; color: #b0b0b0;
            letter-spacing: 2px; text-transform: uppercase;
        }

        .positions-premium {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px; padding: 0 20px;
        }

        .position-premium {
            background: rgba(20,20,30,0.8); backdrop-filter: blur(30px);
            border: 1px solid rgba(255,215,0,0.3); border-radius: 24px;
            padding: 40px 30px; cursor: pointer; transition: all 0.5s ease;
            position: relative; overflow: hidden; text-align: center;
            height: 220px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        .position-premium:hover {
            transform: translateY(-20px) scale(1.03); border-color: #ffd700;
            box-shadow: 0 40px 100px rgba(255,215,0,0.4);
        }

        .position-icon-premium {
            font-size: 64px; margin-bottom: 20px;
            background: linear-gradient(135deg, #ffd700, #00ff88);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 8px 24px rgba(255,215,0,0.6));
        }

        .position-name-premium {
            font-size: 18px; font-weight: 700; color: #ffffff;
            letter-spacing: 1px; line-height: 1.4; text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }

        .back-btn-premium {
            position: fixed; top: 30px; left: 30px; z-index: 1000;
            width: 60px; height: 60px; border-radius: 20px;
            background: rgba(255,215,0,0.2); backdrop-filter: blur(20px);
            border: 2px solid #ffd700; color: #ffd700;
            font-size: 24px; font-weight: 700; cursor: pointer;
            transition: all 0.4s ease; display: flex; align-items: center; justify-content: center;
        }

        .back-btn-premium:hover {
            background: rgba(255,215,0,0.4); transform: scale(1.15);
            box-shadow: 0 20px 60px rgba(255,215,0,0.5);
        }

        .phases-premium {
            position: fixed; right: 30px; top: 50%; transform: translateY(-50%);
            width: 320px; background: rgba(15,15,25,0.95);
            backdrop-filter: blur(40px); border-radius: 32px;
            border: 1px solid rgba(255,215,0,0.4); padding: 40px;
            box-shadow: 0 40px 120px rgba(0,0,0,0.9);
        }

        .phase-title {
            font-size: 28px; font-weight: 800; color: #ffd700;
            text-align: center; margin-bottom: 30px; text-shadow: 0 2px 12px rgba(255,215,0,0.6);
        }

        .phase-grid { display: flex; flex-direction: column; gap: 20px; }

        .phase-premium {
            background: rgba(30,30,45,0.8); border-radius: 20px;
            padding: 30px; cursor: pointer; transition: all 0.4s ease;
            border: 2px solid transparent; position: relative; overflow: hidden;
            display: flex; align-items: center; gap: 25px;
        }

        .phase-attack { border-image: linear-gradient(45deg, #ff6b6b, #ff8e8e) 1; }
        .phase-defense { border-image: linear-gradient(45deg, #4facfe, #7db9ff) 1; }

        .phase-premium:hover {
            border-color: #ffd700; transform: translateX(12px) scale(1.02);
            box-shadow: 0 20px 60px rgba(255,215,0,0.4);
        }

        .phase-icon-premium { font-size: 48px; }
        .phase-text h3 { font-size: 22px; font-weight: 700; color: #ffffff; margin-bottom: 6px; }
        .phase-text p { font-size: 14px; color: #b0b0b0; font-weight: 400; }

        @media (max-width: 768px) {
            .title-premium { font-size: 36px; }
            .positions-premium { grid-template-columns: repeat(2, 1fr); gap: 20px; }
            .phases-premium { 
                position: fixed; left: 0; right: 0; bottom: 0;
                border-radius: 32px 32px 0 0; width: 100%; max-height: 60vh;
            }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <button class="back-btn-premium hidden" onclick="goBack()">←</button>

    <div class="container" id="main-screen">
        <div class="header">
            <div class="logo-premium"></div>
            <div class="title-premium">КУЛЬТУРА ПАСА</div>
            <div class="subtitle-premium">ТАКТИЧЕСКАЯ АКАДЕМИЯ</div>
        </div>

        <div class="positions-premium" id="positions-screen">
            <div class="position-premium" onclick="selectPosition('🛡️ Центральный защитник')">
                <div class="position-icon-premium">🛡️</div>
                <div class="position-name-premium">Центральный защитник</div>
            </div>
            <div class="position-premium" onclick="selectPosition('⬇️ Крайний защитник')">
                <div class="position-icon-premium">⬇️</div>
                <div class="position-name-premium">Крайний защитник</div>
            </div>
            <div class="position-premium" onclick="selectPosition('⚙️ Опорный полузащитник')">
                <div class="position-icon-premium">⚙️</div>
                <div class="position-name-premium">Опорный полузащитник</div>
            </div>
            <div class="position-premium" onclick="selectPosition('🎯 Атакующий полузащитник')">
                <div class="position-icon-premium">🎯</div>
                <div class="position-name-premium">Атакующий полузащитник</div>
            </div>
            <div class="position-premium" onclick="selectPosition('➡️ Инсайд')">
                <div class="position-icon-premium">➡️</div>
                <div class="position-name-premium">Инсайд</div>
            </div>
            <div class="position-premium" onclick="selectPosition('👑 Центральный нападающий')">
                <div class="position-icon-premium">👑</div>
                <div class="position-name-premium">Центральный нападающий</div>
            </div>
            <div class="position-premium" onclick="selectPosition('🎪 Крайний нападающий')">
                <div class="position-icon-premium">🎪</div>
                <div class="position-name-premium">Крайний нападающий</div>
            </div>
        </div>
    </div>

    <div class="phases-premium hidden" id="phases-screen">
        <div class="phase-title" id="phase-title"></div>
        <div class="phase-grid">
            <div class="phase-premium phase-attack" onclick="selectPhase('⚔️ Атака')">
                <div class="phase-icon-premium">⚔️</div>
                <div class="phase-text">
                    <h3>ПРЕМИУМ АТАКА</h3>
                    <p>Тактические решения</p>
                </div>
            </div>
            <div class="phase-premium phase-defense" onclick="selectPhase('🛡️ Оборона')">
                <div class="phase-icon-premium">🛡️</div>
                <div class="phase-text">
                    <h3>ПРЕМИУМ ОБОРОНА</h3>
                    <p>Позиционная игра</p>
                </div>
            </div>
        </div>
    </div>

        Telegram.WebApp.ready(); Telegram.WebApp.expand();
        Telegram.WebApp.MainButton.set
